<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Party Panel — Final Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --font-hdr: 'IM Fell English', serif;
      --font-num: 'Share Tech Mono', monospace;
      --bg:       #0a0a0a;
      --text:     #f0e8d0;
      --accent:   #c8a84b;
      --muted:    #6b6050;
      --surface:  #151515;
      --border:   #2a2520;
      --hp-ok:   #52b96e;
      --hp-hurt: #b87c2a;
      --hp-crit: #b84040;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: var(--text);
      font-family: var(--font-num);
      padding: 24px 16px 60px;
      min-height: 100vh;
    }

    .page-title {
      font-family: var(--font-hdr);
      color: var(--accent);
      font-size: 1.5rem;
      text-align: center;
      margin-bottom: 4px;
    }
    .page-note {
      font-size: 0.7rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 24px;
      letter-spacing: 0.05em;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .toggle-label { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
    .toggle-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      cursor: pointer;
      font-family: var(--font-num);
      font-size: 0.72rem;
      padding: 4px 12px;
      transition: border-color 0.15s, color 0.15s;
    }
    .toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
    .toggle-btn.active { border-color: var(--accent); color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, transparent); }

    /* Sheet simulation */
    .sheet-shell {
      max-width: 380px;
      margin: 0 auto;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
    }

    /* Context rows */
    .cbt-stats {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .cbt-stat-box {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 6px;
      text-align: center;
    }
    .cbt-stat-label {
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .cbt-stat-value { color: var(--accent); font-size: 1.1rem; }

    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
      margin-top: 8px;
    }
    .ability-grid-stub {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .ability-cell-stub {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 6px;
      text-align: center;
    }
    .ability-cell-name  { font-size: 0.55rem; color: var(--muted); text-transform: uppercase; }
    .ability-cell-mod   { font-size: 1.1rem; color: var(--accent); }
    .ability-cell-score { font-size: 0.6rem; color: var(--muted); }

    /* ── Party panel ───────────────────────────────────── */
    #party-panel {
      margin-bottom: 8px;
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.25s ease;
      max-height: 300px;
      opacity: 1;
    }
    #party-panel.hidden {
      max-height: 0;
      opacity: 0;
    }

    .party-list {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .party-card {
      flex: 0 0 90px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .party-portrait {
      width: 100%;
      height: 68px;
      object-fit: cover;
      display: block;
    }

    .party-card-info {
      padding: 5px 6px 7px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .party-name {
      font-size: 0.65rem;
      letter-spacing: 0.04em;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      width: 100%;
      text-align: center;
    }

    /* ── 3-dot health indicator ────────────────────────── */
    .party-dots {
      display: flex;
      gap: 4px;
      justify-content: center;
    }
    .party-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.2s;
    }
    .party-dot.lit-ok   { background: var(--hp-ok); }
    .party-dot.lit-hurt { background: var(--hp-hurt); }
    .party-dot.lit-crit { background: var(--hp-crit); }

    /* Fake avatar placeholder colours */
    .av-aldric { background: linear-gradient(160deg, #2a4a7a 0%, #4a7acc 100%); }
    .av-mireth { background: linear-gradient(160deg, #4a2a6a 0%, #7a4acc 100%); }
    .av-grond  { background: linear-gradient(160deg, #4a2a1a 0%, #7a4a2a 100%); }
    .av-silas  { background: linear-gradient(160deg, #1a4a2a 0%, #3a8a4a 100%); }
  </style>
</head>
<body>

  <h1 class="page-title">Party Panel — Final Design</h1>
  <p class="page-note">Design B · portrait cards · 3-dot health state · hidden when no party</p>

  <div class="toggle-row">
    <span class="toggle-label">Simulate:</span>
    <button class="toggle-btn active" id="btn-show" onclick="setParty(true)">Party present</button>
    <button class="toggle-btn"        id="btn-hide" onclick="setParty(false)">No party (hidden)</button>
  </div>

  <div class="sheet-shell">

    <!-- AC / Initiative / Luck (context above) -->
    <div class="cbt-stats">
      <div class="cbt-stat-box">
        <div class="cbt-stat-label">Armor Class</div>
        <div class="cbt-stat-value">14</div>
      </div>
      <div class="cbt-stat-box">
        <div class="cbt-stat-label">Initiative</div>
        <div class="cbt-stat-value">+1</div>
      </div>
      <div class="cbt-stat-box">
        <div class="cbt-stat-label">Luck Token</div>
        <div class="cbt-stat-value">2</div>
      </div>
    </div>

    <!-- Party panel -->
    <div id="party-panel">
      <div class="section-label" style="margin-top:0">Party</div>
      <div class="party-list">

        <!-- Aldric: healthy (●●●) -->
        <div class="party-card">
          <div class="party-portrait av-aldric" style="display:flex;align-items:center;justify-content:center;font-family:var(--font-hdr);font-size:1.8rem;color:rgba(255,255,255,0.5)">A</div>
          <div class="party-card-info">
            <span class="party-name">Aldric</span>
            <div class="party-dots">
              <div class="party-dot lit-ok"></div>
              <div class="party-dot lit-ok"></div>
              <div class="party-dot lit-ok"></div>
            </div>
          </div>
        </div>

        <!-- Mireth: hurt (●●·) -->
        <div class="party-card">
          <div class="party-portrait av-mireth" style="display:flex;align-items:center;justify-content:center;font-family:var(--font-hdr);font-size:1.8rem;color:rgba(255,255,255,0.5)">M</div>
          <div class="party-card-info">
            <span class="party-name">Mireth</span>
            <div class="party-dots">
              <div class="party-dot lit-hurt"></div>
              <div class="party-dot lit-hurt"></div>
              <div class="party-dot"></div>
            </div>
          </div>
        </div>

        <!-- Grond: critical (●··) -->
        <div class="party-card">
          <div class="party-portrait av-grond" style="display:flex;align-items:center;justify-content:center;font-family:var(--font-hdr);font-size:1.8rem;color:rgba(255,255,255,0.5)">G</div>
          <div class="party-card-info">
            <span class="party-name">Grond</span>
            <div class="party-dots">
              <div class="party-dot lit-crit"></div>
              <div class="party-dot"></div>
              <div class="party-dot"></div>
            </div>
          </div>
        </div>

        <!-- Silas: unknown HP (···) -->
        <div class="party-card">
          <div class="party-portrait av-silas" style="display:flex;align-items:center;justify-content:center;font-family:var(--font-hdr);font-size:1.8rem;color:rgba(255,255,255,0.5)">S</div>
          <div class="party-card-info">
            <span class="party-name">Silas</span>
            <div class="party-dots">
              <div class="party-dot"></div>
              <div class="party-dot"></div>
              <div class="party-dot"></div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- Ability Scores (context below) -->
    <div class="section-label">Ability Scores</div>
    <div class="ability-grid-stub">
      <div class="ability-cell-stub"><div class="ability-cell-name">STR</div><div class="ability-cell-mod">+2</div><div class="ability-cell-score">14</div></div>
      <div class="ability-cell-stub"><div class="ability-cell-name">DEX</div><div class="ability-cell-mod">+1</div><div class="ability-cell-score">12</div></div>
      <div class="ability-cell-stub"><div class="ability-cell-name">CON</div><div class="ability-cell-mod">+0</div><div class="ability-cell-score">11</div></div>
      <div class="ability-cell-stub"><div class="ability-cell-name">INT</div><div class="ability-cell-mod">−1</div><div class="ability-cell-score">8</div></div>
      <div class="ability-cell-stub"><div class="ability-cell-name">WIS</div><div class="ability-cell-mod">+1</div><div class="ability-cell-score">13</div></div>
      <div class="ability-cell-stub"><div class="ability-cell-name">CHA</div><div class="ability-cell-mod">+0</div><div class="ability-cell-score">10</div></div>
    </div>

  </div>

  <script>
    function setParty(show) {
      var el = document.getElementById('party-panel');
      if (show) el.classList.remove('hidden');
      else       el.classList.add('hidden');
      document.getElementById('btn-show').classList.toggle('active',  show);
      document.getElementById('btn-hide').classList.toggle('active', !show);
    }
  </script>

</body>
</html>
