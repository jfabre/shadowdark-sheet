<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shadowdark Sheet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    /* ── Theme tokens ───────────────────────────────────── */
    :root {
      --bg:       #0a0a0a;
      --text:     #f0e8d0;
      --accent:   #c8a84b;
      --muted:    #6b6050;
      --surface:  #151515;
      --border:   #2a2520;
      --font-hdr: 'IM Fell English', serif;
      --font-num: 'Share Tech Mono', monospace;
      --tab-h:    52px;
    }

    /* ── Base ───────────────────────────────────────────── */
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-hdr);
      font-size: 16px;
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 100dvh;
    }

    /* ── Content area ───────────────────────────────────── */
    #content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px calc(var(--tab-h) + 8px);
    }

    /* ── Tab panels ─────────────────────────────────────── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .tab-panel h2 {
      font-family: var(--font-hdr);
      font-size: 1.4rem;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
      margin-bottom: 16px;
      letter-spacing: 0.04em;
    }

    .tab-panel p {
      color: var(--muted);
      font-style: italic;
      font-size: 0.9rem;
    }

    /* ── Tab bar (bottom) ───────────────────────────────── */
    #tab-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: var(--tab-h);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      border-top: 3px solid transparent;
      color: var(--muted);
      font-family: var(--font-num);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding-top: 4px;
      transition: color 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .tab-btn .tab-icon {
      font-size: 1.1rem;
      line-height: 1;
    }

    .tab-btn.active {
      color: var(--accent);
      border-top-color: var(--accent);
    }

    .tab-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }

    /* ── Gear tab ───────────────────────────────────────── */
    .gear-section {
      margin-bottom: 20px;
    }

    .gear-subhead {
      font-family: var(--font-hdr);
      font-size: 0.95rem;
      color: var(--accent);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* Currency */
    .currency-row {
      display: flex;
      gap: 10px;
    }

    .currency-field {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .currency-label {
      font-family: var(--font-num);
      font-size: 0.75rem;
      color: var(--accent);
      letter-spacing: 0.1em;
    }

    .currency-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-num);
      font-size: 1.2rem;
      text-align: center;
      padding: 6px 4px;
      border-radius: 4px;
    }

    /* Encumbrance */
    .enc-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
    }

    .enc-label {
      font-family: var(--font-hdr);
      font-size: 0.95rem;
      color: var(--accent);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .enc-count {
      font-family: var(--font-num);
      font-size: 0.85rem;
      color: var(--muted);
    }

    .enc-bar-wrap {
      height: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      overflow: hidden;
    }

    .enc-bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 5px;
      transition: width 0.2s, background 0.2s;
    }

    .enc-bar.over-limit {
      background: #c0392b;
    }

    /* Armor */
    .armor-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .armor-name-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-hdr);
      font-size: 0.95rem;
      padding: 6px 8px;
      border-radius: 4px;
    }

    .armor-ac-field {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .armor-ac-label {
      font-family: var(--font-num);
      font-size: 0.75rem;
      color: var(--accent);
      letter-spacing: 0.08em;
    }

    .armor-ac-input {
      width: 52px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-num);
      font-size: 1.1rem;
      text-align: center;
      padding: 6px 4px;
      border-radius: 4px;
    }

    /* Torches */
    .torch-row {
      display: flex;
      gap: 10px;
    }

    .torch-field {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .torch-label {
      font-family: var(--font-hdr);
      font-size: 0.85rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .torch-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-num);
      font-size: 1rem;
      text-align: center;
      padding: 6px 4px;
      border-radius: 4px;
      min-width: 0;
    }

    /* Inventory */
    .inv-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .inv-add-btn {
      background: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 1.1rem;
      line-height: 1;
      width: 28px;
      height: 28px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    .inv-add-btn:active { opacity: 0.7; }

    .inv-col-heads {
      display: grid;
      grid-template-columns: 1fr 44px 40px 1fr 28px;
      gap: 4px;
      padding: 0 2px 4px;
    }

    .inv-col-heads span {
      font-family: var(--font-num);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
    }

    .inv-col-heads .inv-col-name,
    .inv-col-heads .inv-col-notes { text-align: left; }

    .inv-row {
      display: grid;
      grid-template-columns: 1fr 44px 40px 1fr 28px;
      gap: 4px;
      margin-bottom: 4px;
      align-items: center;
    }

    .inv-row input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-hdr);
      font-size: 0.85rem;
      padding: 5px 6px;
      border-radius: 4px;
      width: 100%;
      min-width: 0;
    }

    .inv-row input[type="number"] {
      font-family: var(--font-num);
      text-align: center;
      padding: 5px 2px;
    }

    .inv-del-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.95rem;
      cursor: pointer;
      padding: 4px;
      border-radius: 3px;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .inv-del-btn:active { color: #c0392b; }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { opacity: 0.4; }

    input { outline: none; }
    input:focus { border-color: var(--accent); }
  </style>
</head>
<body>

  <!-- ── Content ─────────────────────────────────────── -->
  <div id="content">

    <div id="panel-core" class="tab-panel active">
      <h2>Core</h2>
      <p>Character identity &amp; ability scores — coming soon.</p>
    </div>

    <div id="panel-combat" class="tab-panel">
      <h2>Combat</h2>
      <p>AC, attacks, spells, saves — coming soon.</p>
    </div>

    <div id="panel-gear" class="tab-panel">
      <h2>Gear</h2>

      <!-- Currency -->
      <section class="gear-section">
        <div class="currency-row">
          <label class="currency-field">
            <span class="currency-label">GP</span>
            <input type="number" id="gear-gp" min="0" class="currency-input" value="0" />
          </label>
          <label class="currency-field">
            <span class="currency-label">SP</span>
            <input type="number" id="gear-sp" min="0" class="currency-input" value="0" />
          </label>
          <label class="currency-field">
            <span class="currency-label">CP</span>
            <input type="number" id="gear-cp" min="0" class="currency-input" value="0" />
          </label>
        </div>
      </section>

      <!-- Encumbrance -->
      <section class="gear-section">
        <div class="enc-header">
          <span class="enc-label">Encumbrance</span>
          <span class="enc-count"><span id="enc-used">0</span> / <span id="enc-max">10</span> slots</span>
        </div>
        <div class="enc-bar-wrap">
          <div id="enc-bar" class="enc-bar"></div>
        </div>
      </section>

      <!-- Armor Worn -->
      <section class="gear-section">
        <h3 class="gear-subhead">Armor Worn</h3>
        <div class="armor-row">
          <input type="text" id="gear-armor-name" placeholder="Armor name" class="armor-name-input" />
          <label class="armor-ac-field">
            <span class="armor-ac-label">AC+</span>
            <input type="number" id="gear-armor-ac" min="0" class="armor-ac-input" value="0" />
          </label>
        </div>
      </section>

      <!-- Light Sources -->
      <section class="gear-section">
        <h3 class="gear-subhead">Light Sources</h3>
        <div class="torch-row">
          <label class="torch-field">
            <span class="torch-label">Torches</span>
            <input type="number" id="gear-torches" min="0" class="torch-input" value="0" />
          </label>
          <label class="torch-field">
            <span class="torch-label">Burn time (hrs)</span>
            <input type="number" id="gear-burn-time" min="0" step="0.5" class="torch-input" value="1" />
          </label>
        </div>
      </section>

      <!-- Inventory -->
      <section class="gear-section">
        <div class="inv-header">
          <h3 class="gear-subhead">Inventory</h3>
          <button id="inv-add-btn" class="inv-add-btn" aria-label="Add item">＋</button>
        </div>
        <div class="inv-col-heads">
          <span class="inv-col-name">Item</span>
          <span class="inv-col-slots">Slots</span>
          <span class="inv-col-qty">Qty</span>
          <span class="inv-col-notes">Notes</span>
          <span class="inv-col-del"></span>
        </div>
        <div id="inv-list"></div>
      </section>
    </div>

    <div id="panel-class" class="tab-panel">
      <h2>Class</h2>
      <p>Talents, spells &amp; class features — coming soon.</p>
    </div>

  </div>

  <!-- ── Tab bar ─────────────────────────────────────── -->
  <nav id="tab-bar" role="tablist" aria-label="Character sheet sections">
    <button class="tab-btn active" role="tab" aria-selected="true"  aria-controls="panel-core"   data-panel="core">
      <span class="tab-icon">⚔</span>CORE
    </button>
    <button class="tab-btn"        role="tab" aria-selected="false" aria-controls="panel-combat" data-panel="combat">
      <span class="tab-icon">🛡</span>COMBAT
    </button>
    <button class="tab-btn"        role="tab" aria-selected="false" aria-controls="panel-gear"   data-panel="gear">
      <span class="tab-icon">🎒</span>GEAR
    </button>
    <button class="tab-btn"        role="tab" aria-selected="false" aria-controls="panel-class"  data-panel="class">
      <span class="tab-icon">📜</span>CLASS
    </button>
  </nav>

  <script>
    // ── Tab switching ──────────────────────────────────
    const tabBtns   = document.querySelectorAll('.tab-btn');
    const tabPanels = document.querySelectorAll('.tab-panel');

    function switchTab(panelName) {
      tabBtns.forEach(btn => {
        const active = btn.dataset.panel === panelName;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-selected', active);
      });
      tabPanels.forEach(panel => {
        panel.classList.toggle('active', panel.id === `panel-${panelName}`);
      });
    }

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.panel));
    });

    // ── localStorage skeleton ──────────────────────────
    const STORAGE_KEY = 'shadowdark_character';

    function loadCharacter() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch {
        return {};
      }
    }

    function saveCharacter(data) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (e) {
        console.warn('Could not save character data:', e);
      }
    }

    // Exposed globally for child tabs to use
    window.SD = { loadCharacter, saveCharacter };

    // Initialise with stored data on load
    window.SD.character = loadCharacter();
  </script>

  <script>
    // ── GEAR TAB ────────────────────────────────────────
    (function () {
      const GEAR_DEFAULTS = {
        gp: 0, sp: 0, cp: 0,
        armorName: '', armorAc: 0,
        torches: 0, burnTime: 1,
        inventory: []
      };

      function getGear() {
        return Object.assign({}, GEAR_DEFAULTS, window.SD.character.gear || {});
      }

      function saveGear(gear) {
        window.SD.character.gear = gear;
        window.SD.saveCharacter(window.SD.character);
      }

      function getStrMax() {
        return (window.SD.character.core && window.SD.character.core.str)
          ? Number(window.SD.character.core.str) || 10
          : 10;
      }

      // ── Encumbrance bar ──────────────────────────────
      function updateEncumbrance() {
        const rows = document.querySelectorAll('#inv-list .inv-row');
        let used = 0;
        rows.forEach(row => {
          const slots = parseFloat(row.querySelector('.inv-item-slots').value) || 0;
          used += slots;
        });
        const max = getStrMax();
        document.getElementById('enc-used').textContent = used;
        document.getElementById('enc-max').textContent = max;
        const pct = max > 0 ? Math.min((used / max) * 100, 100) : 0;
        const bar = document.getElementById('enc-bar');
        bar.style.width = pct + '%';
        bar.classList.toggle('over-limit', used > max);
      }

      // ── Inventory rows ───────────────────────────────
      let rowIdCounter = 0;

      function createInvRow(data) {
        data = data || { name: '', slots: 1, qty: 1, notes: '' };
        const id = ++rowIdCounter;
        const row = document.createElement('div');
        row.className = 'inv-row';
        row.dataset.rowId = id;
        row.innerHTML = `
          <input type="text"   class="inv-item-name"  placeholder="Item"  value="${escHtml(data.name)}" />
          <input type="number" class="inv-item-slots"  min="0" step="0.5" value="${data.slots}" />
          <input type="number" class="inv-item-qty"    min="1"            value="${data.qty}" />
          <input type="text"   class="inv-item-notes" placeholder="Notes" value="${escHtml(data.notes)}" />
          <button class="inv-del-btn" aria-label="Remove item">🗑</button>
        `;

        row.querySelector('.inv-del-btn').addEventListener('click', () => {
          row.remove();
          updateEncumbrance();
          collectAndSave();
        });

        row.querySelectorAll('input').forEach(inp => {
          inp.addEventListener('input', () => {
            if (inp.classList.contains('inv-item-slots')) updateEncumbrance();
            collectAndSave();
          });
        });

        return row;
      }

      function escHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/"/g, '&quot;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function collectInventory() {
        return Array.from(document.querySelectorAll('#inv-list .inv-row')).map(row => ({
          name:  row.querySelector('.inv-item-name').value,
          slots: parseFloat(row.querySelector('.inv-item-slots').value) || 0,
          qty:   parseInt(row.querySelector('.inv-item-qty').value, 10) || 1,
          notes: row.querySelector('.inv-item-notes').value
        }));
      }

      function collectAndSave() {
        saveGear({
          gp:        parseFloat(document.getElementById('gear-gp').value) || 0,
          sp:        parseFloat(document.getElementById('gear-sp').value) || 0,
          cp:        parseFloat(document.getElementById('gear-cp').value) || 0,
          armorName: document.getElementById('gear-armor-name').value,
          armorAc:   parseFloat(document.getElementById('gear-armor-ac').value) || 0,
          torches:   parseInt(document.getElementById('gear-torches').value, 10) || 0,
          burnTime:  parseFloat(document.getElementById('gear-burn-time').value) || 0,
          inventory: collectInventory()
        });
      }

      // ── Render from saved data ───────────────────────
      function renderGear() {
        const gear = getGear();

        document.getElementById('gear-gp').value       = gear.gp;
        document.getElementById('gear-sp').value       = gear.sp;
        document.getElementById('gear-cp').value       = gear.cp;
        document.getElementById('gear-armor-name').value = gear.armorName;
        document.getElementById('gear-armor-ac').value = gear.armorAc;
        document.getElementById('gear-torches').value  = gear.torches;
        document.getElementById('gear-burn-time').value = gear.burnTime;

        const list = document.getElementById('inv-list');
        list.innerHTML = '';
        (gear.inventory || []).forEach(item => {
          list.appendChild(createInvRow(item));
        });

        updateEncumbrance();
      }

      // ── Wire top-level inputs ────────────────────────
      ['gear-gp','gear-sp','gear-cp','gear-armor-name','gear-armor-ac',
       'gear-torches','gear-burn-time'].forEach(id => {
        document.getElementById(id).addEventListener('input', collectAndSave);
      });

      document.getElementById('inv-add-btn').addEventListener('click', () => {
        document.getElementById('inv-list').appendChild(createInvRow());
        updateEncumbrance();
        collectAndSave();
      });

      renderGear();
    })();
  </script>

</body>
</html>
