<!DOCTYPE html>
<html lang="en" data-theme="dungeon">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shadowdark Sheet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Content ─────────────────────────────────────── -->
  <div id="content">

    <div id="panel-core" class="tab-panel active">

      <!-- Character name -->
      <input type="text" id="char-name" class="char-name-input" placeholder="Character Name" autocomplete="off" />

      <!-- Class / Level / Ancestry -->
      <div class="identity-grid">
        <div class="field-group">
          <label for="char-class">Class</label>
          <input type="text" id="char-class" placeholder="Fighter" autocomplete="off" />
        </div>
        <div class="field-group">
          <label for="char-level">Level</label>
          <input type="number" id="char-level" min="1" max="10" value="1" />
        </div>
        <div class="field-group">
          <label for="char-ancestry">Ancestry</label>
          <select id="char-ancestry">
            <option value="">—</option>
            <option value="Human">Human</option>
            <option value="Elf">Elf</option>
            <option value="Dwarf">Dwarf</option>
            <option value="Halfling">Halfling</option>
            <option value="Half-Orc">Half-Orc</option>
            <option value="Goblin">Goblin</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <!-- Alignment -->
      <div class="field-row">
        <span class="field-label">Alignment</span>
        <div class="alignment-selector" id="alignment-selector">
          <button class="align-btn" data-value="Lawful">Lawful</button>
          <button class="align-btn" data-value="Neutral">Neutral</button>
          <button class="align-btn" data-value="Chaotic">Chaotic</button>
        </div>
      </div>

      <!-- XP -->
      <div class="xp-row">
        <span class="field-label">XP</span>
        <input type="number" id="char-xp" min="0" value="0" />
        <span class="xp-sep">/</span>
        <input type="number" id="char-xp-next" min="0" value="10" />
        <span class="field-label" style="margin-left:4px;min-width:unset">next lvl</span>
      </div>

      <!-- Ability scores 2×3 grid -->
      <div class="section-label">Ability Scores</div>
      <div class="ability-grid" id="ability-grid">
        <!-- populated by JS -->
      </div>

      <!-- HP -->
      <div class="hp-row">
        <span class="field-label">HP</span>
        <input type="number" id="hp-current" min="0" value="0" />
        <span class="hp-sep">/</span>
        <input type="number" id="hp-max" min="0" value="0" />
        <button class="roll-btn" id="roll-hp-btn">Roll HP</button>
      </div>

      <!-- Luck tokens (Halfling racial) -->
      <div class="luck-row" id="luck-row">
        <span class="field-label">Luck Tokens</span>
        <input type="number" id="luck-tokens" min="0" max="3" value="0" />
        <span class="luck-halfling-note" id="luck-note">Halfling racial</span>
      </div>

      <!-- Languages -->
      <div class="field-group" style="margin-bottom:14px">
        <label for="char-languages">Languages</label>
        <input type="text" id="char-languages" placeholder="Common, Elvish…" autocomplete="off" />
      </div>

    </div>

    <div id="panel-combat" class="tab-panel">
      <h2>Combat</h2>

      <!-- AC / Initiative / Speed -->
      <div class="cbt-stats">
        <div class="cbt-stat-box">
          <div class="cbt-stat-label">AC</div>
          <input id="cbt-ac" type="number" class="cbt-stat-num" min="0" max="30" value="10" inputmode="numeric" />
        </div>
        <div class="cbt-stat-box">
          <div class="cbt-stat-label">Initiative</div>
          <div id="cbt-init" class="cbt-stat-derived">+0</div>
        </div>
        <div class="cbt-stat-box">
          <div class="cbt-stat-label">Speed</div>
          <input id="cbt-speed" type="text" class="cbt-stat-speed" value="30 ft" />
        </div>
      </div>

      <!-- Attacks -->
      <div class="cbt-section">
        <div class="cbt-section-head">
          <span>Attacks</span>
          <button id="cbt-add-attack" class="cbt-add-btn" aria-label="Add attack">＋</button>
        </div>
        <div class="atk-cols-head">
          <span>Weapon</span><span>Bonus</span><span>Damage</span><span>Notes</span><span></span>
        </div>
        <div id="cbt-attack-list"></div>
      </div>

      <!-- Spells -->
      <div class="cbt-section">
        <div class="cbt-section-head">
          <span>Spells</span>
          <button id="cbt-add-spell" class="cbt-add-btn" aria-label="Add spell">＋</button>
        </div>
        <div id="cbt-spell-list"></div>
      </div>

    </div>

    <div id="panel-gear" class="tab-panel">
      <h2>Gear</h2>

      <!-- Currency -->
      <section class="gear-section">
        <div class="currency-row">
          <label class="currency-field">
            <span class="currency-label currency-label--gp">GP</span>
            <input type="number" id="gear-gp" min="0" class="currency-input" value="0" />
          </label>
          <label class="currency-field">
            <span class="currency-label currency-label--sp">SP</span>
            <input type="number" id="gear-sp" min="0" class="currency-input" value="0" />
          </label>
        </div>
      </section>

      <!-- Encumbrance -->
      <section class="gear-section">
        <div class="enc-header">
          <span class="enc-label">Encumbrance</span>
          <span class="enc-count"><span id="enc-used">0</span> / <span id="enc-max">10</span> slots</span>
        </div>
        <div class="enc-bar-wrap">
          <div id="enc-bar" class="enc-bar"></div>
        </div>
      </section>

      <!-- Armor Worn -->
      <section class="gear-section">
        <h3 class="gear-subhead">Armor Worn</h3>
        <div class="armor-row">
          <input type="text" id="gear-armor-name" placeholder="Armor name" class="armor-name-input" />
          <label class="armor-ac-field">
            <span class="armor-ac-label">AC+</span>
            <input type="number" id="gear-armor-ac" min="0" class="armor-ac-input" value="0" />
          </label>
        </div>
      </section>

      <!-- Light Sources -->
      <section class="gear-section">
        <h3 class="gear-subhead">Light Sources</h3>
        <div class="torch-row">
          <label class="torch-field">
            <span class="torch-label">Torches</span>
            <input type="number" id="gear-torches" min="0" class="torch-input" value="0" />
          </label>
          <label class="torch-field">
            <span class="torch-label">Burn time (hrs)</span>
            <input type="number" id="gear-burn-time" min="0" step="0.5" class="torch-input" value="1" />
          </label>
        </div>
      </section>

      <!-- Inventory -->
      <section class="gear-section">
        <div class="inv-header">
          <h3 class="gear-subhead">Inventory</h3>
          <button id="inv-add-btn" class="inv-add-btn" aria-label="Add item">＋</button>
        </div>
        <div class="inv-col-heads">
          <span class="inv-col-name">Item</span>
          <span class="inv-col-slots">Slots</span>
          <span class="inv-col-qty">Qty</span>
          <span class="inv-col-notes">Notes</span>
          <span class="inv-col-del"></span>
        </div>
        <div id="inv-list"></div>
      </section>
    </div>

    <div id="panel-class" class="tab-panel">
      <h2>Class</h2>

      <!-- Class + Level header -->
      <div class="cls-header">
        <div class="fld fld--grow">
          <label class="fld-label" for="cls-name">Class</label>
          <input id="cls-name" class="fld-input" type="text" placeholder="Fighter, Wizard…" autocomplete="off" />
        </div>
        <div class="fld fld--narrow">
          <label class="fld-label" for="cls-level">Level</label>
          <input id="cls-level" class="fld-input" type="number" min="1" max="10" placeholder="1" />
        </div>
      </div>

      <!-- Talents -->
      <div class="cls-section">
        <div class="cls-section-hdr">
          <span class="cls-section-title">Talents</span>
        </div>
        <div id="talents-list"></div>
      </div>

      <!-- Class Features (collapsible) -->
      <div class="cls-section">
        <button class="features-toggle" id="features-toggle"
                aria-expanded="true" aria-controls="features-body">
          <span class="cls-section-title">Class Features</span>
          <span class="toggle-arrow">▾</span>
        </button>
        <div id="features-body" class="features-body"></div>
      </div>

      <!-- Background -->
      <div class="cls-section">
        <div class="cls-section-hdr">
          <span class="cls-section-title">Background</span>
        </div>
        <textarea id="cls-background" class="auto-grow"
                  placeholder="Your character's background…"></textarea>
      </div>

      <!-- Deity -->
      <div class="cls-section deity-section" id="deity-section">
        <div class="cls-section-hdr">
          <span class="cls-section-title">Deity</span>
        </div>
        <input id="cls-deity" class="fld-input" type="text"
               placeholder="Name of deity worshipped" autocomplete="off" />
      </div>

      <!-- Notes / Backstory -->
      <div class="cls-section">
        <div class="cls-section-hdr">
          <span class="cls-section-title">Notes &amp; Backstory</span>
        </div>
        <textarea id="cls-notes" class="auto-grow"
                  placeholder="History, personality, campaign notes…"></textarea>
      </div>

    </div>

  </div>

  <!-- ── Theme selector ──────────────────────────────── -->
  <button id="theme-btn" aria-label="Choose theme" aria-expanded="false" aria-controls="theme-popover">⚜</button>
  <div id="theme-popover" role="dialog" aria-label="Theme selection">
    <div class="theme-swatches">
      <button class="theme-swatch" data-theme="dungeon" aria-pressed="true" title="Dungeon">
        <span class="theme-swatch-circle" style="background:#1a1510; border:1px solid #2a2520;"></span>
        <span class="theme-swatch-label">Dungeon</span>
      </button>
      <button class="theme-swatch" data-theme="parchment" aria-pressed="false" title="Parchment">
        <span class="theme-swatch-circle" style="background:#f2e8cc; border:1px solid #c8b080;"></span>
        <span class="theme-swatch-label">Parchment</span>
      </button>
      <button class="theme-swatch" data-theme="blood-moon" aria-pressed="false" title="Blood Moon">
        <span class="theme-swatch-circle" style="background:#3d0808; border:1px solid #5a1010;"></span>
        <span class="theme-swatch-label">Blood Moon</span>
      </button>
    </div>
  </div>

  <!-- ── Tab bar ─────────────────────────────────────── -->
  <nav id="tab-bar" role="tablist" aria-label="Character sheet sections">
    <button class="tab-btn active" role="tab" aria-selected="true"  aria-controls="panel-core"   data-panel="core">
      <span class="tab-icon">⚔</span>CORE
    </button>
    <button class="tab-btn"        role="tab" aria-selected="false" aria-controls="panel-combat" data-panel="combat">
      <span class="tab-icon">🛡</span>COMBAT
    </button>
    <button class="tab-btn"        role="tab" aria-selected="false" aria-controls="panel-gear"   data-panel="gear">
      <span class="tab-icon">🎒</span>GEAR
    </button>
    <button class="tab-btn"        role="tab" aria-selected="false" aria-controls="panel-class"  data-panel="class">
      <span class="tab-icon">📜</span>CLASS
    </button>
  </nav>

  <script src="script.js"></script>

</body>
</html>
